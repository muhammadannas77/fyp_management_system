name: fyp_management_system
description: FYP Management System - Phase-based workflow for Students, Supervisors, and Admin
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core
  firebase_core: ^2.27.1

  # Firebase Auth
  firebase_auth: ^4.18.0

  # Cloud Firestore
  cloud_firestore: ^4.15.9

  # Firebase Storage
  firebase_storage: ^11.7.6

  # Firebase Cloud Messaging
  firebase_messaging: ^14.8.4

  # State Management
  provider: ^6.1.2

  # File picking (withData:true = no dart:io needed)
  file_picker: ^8.0.3

  # Open URLs / files in browser
  url_launcher: ^6.2.5

  # Local notifications for FCM foreground messages
  flutter_local_notifications: ^17.1.2

  # Date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
